name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Clean and Push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # ၁။ Binary ဖိုင်တွေကို အရှင်းဖျောက်ဖို့ Git History ကိုပါ ရှင်းမယ်
          rm -rf .smithery
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # ၂။ Git filter-repo မလိုဘဲ အရှင်းဆုံးနည်းနဲ့ သွားမယ်
          # လောလောဆယ် ရှိနေတဲ့ ဖိုင်တွေကိုပဲ ယူပြီး Branch အသစ်တစ်ခုလို ပို့မယ်
          git checkout --orphan temp-branch
          git add -A
          git commit -m "Initial clean sync"
          
          # ၃။ Hugging Face ကို အတင်းတွန်းပို့မယ်
          git push --force https://PYAE1994:$HF_TOKEN@huggingface.co/spaces/PYAE1994/n8n-management-mcp-community temp-branch:main
