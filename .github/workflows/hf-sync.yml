name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Force delete offending files
        run: |
          rm -rf .smithery
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git commit -m "Remove binary files" || echo "No changes to commit"
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://PYAE1994:$HF_TOKEN@huggingface.co/spaces/PYAE1994/n8n-management-mcp-community main
